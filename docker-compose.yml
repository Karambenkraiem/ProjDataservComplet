services:

  postgres:
    image: postgres:16-alpine
    container_name: dataserv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dataserv
      POSTGRES_USER: dataserv
      POSTGRES_PASSWORD: dataserv_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dataserv-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataserv -d dataserv"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dataserv-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dataserv-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # target: runner
    container_name: dataserv-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://dataserv:dataserv_pass@postgres:5432/dataserv
      JWT_SECRET: dataserv_jwt_secret_change_me
      JWT_EXPIRES_IN: 24h
      PORT: "3001"
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - dataserv-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dataserv-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # NEXT_PUBLIC_API_URL: /api
    ports:
      - "3000:3000"
    networks:
      - dataserv-net

  nginx:
    image: nginx:1.25-alpine
    container_name: dataserv-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dataserv-net

volumes:
  pgdata:
    name: dataserv-pgdata
  uploads:
    name: dataserv-uploads

networks:
  dataserv-net:
    name: dataserv-network
    driver: bridge